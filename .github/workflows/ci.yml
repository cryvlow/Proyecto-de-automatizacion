name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

env:
  IMAGE_NAME: scout-cli:ci

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run unit tests
        run: go test ./...

      - name: Build binary
        run: go build -o bin/scout-cli ./cmd/scout-cli

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_cryvlow03 }}
          password: ${{ secrets.DOCKERHUB_dckr_pat_HuSh8_5Y-Vm64VibbGWQvIB9PrU }}

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}
          only-severities: critical,high
          exit-code: true