name: Release Branch Validation

on:
  push:
    branches:
      - "release/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build -o bin/scout-cli ./cmd/scout-cli

      - name: Build Docker image
        run: docker build -t scout-cli:release .